name: dbcli
description: PostgreSQL inspection and query skill for agent workflows using dbcli.
version: 1
triggers:
  - dbcli
  - postgresql
  - schema
  - database description
  - table description
  - table relationship
  - sql query
entrypoint: ../SKILL.md
capabilities:
  - inspect tables
  - inspect database descriptions
  - inspect table descriptions
  - inspect schema
  - inspect related tables
  - run sql
constraints:
  - PostgreSQL only
  - requires saved/current connection
